server.port=8080
spring.application.name=api-gateway

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
payee.service.url=${PAYEE_SERVICE_URL:http://localhost:8082}
bank.scoring.service.url=${BANK_SCORING_SERVICE_URL:http://localhost:8083}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${auth.service.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=payee-service
spring.cloud.gateway.routes[1].uri=${payee.service.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.routes[2].id=bank-service
spring.cloud.gateway.routes[2].uri=${bank.scoring.service.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/banks/**

spring.cloud.gateway.routes[3].id=scoring-service
spring.cloud.gateway.routes[3].uri=${bank.scoring.service.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/scoring/**

spring.cloud.gateway.routes[4].id=payee-service-compat
spring.cloud.gateway.routes[4].uri=${payee.service.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/customers/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/customers/(?<segment>.*), /api/customers/${segment}

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
