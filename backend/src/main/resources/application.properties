spring.application.name=favourite-payee-backend

spring.datasource.url=jdbc:h2:mem:favouritepayee;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=change-this-secret-key-to-a-long-random-value-1234567890123456
jwt.expiry-minutes=120

scoring.frequency-weight=1.0
scoring.recency-weight=1.0
scoring.time-weight=0.5

cors.allowed-origin=http://localhost:4200
