server.port=8082
spring.application.name=payee-service

spring.datasource.url=jdbc:h2:mem:payeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=${JWT_SECRET:favouritePayeeSecretKey2024HighlySecureAndLongEnough}
jwt.expiry-minutes=120

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
bank.service.url=${BANK_SERVICE_URL:http://localhost:8083}
scoring.service.url=${SCORING_SERVICE_URL:http://localhost:8083}

cors.allowed-origin=http://localhost:4200
